# =============================================================================
# Predicting Bagrut Success — Step 2 Configuration (Three-Way Merge)
# Project: Predicting Bagrut Success from Municipal Socioeconomics and
#          School-Level Institutional Resources
# Authors: Yousef Shihade & Shada Esawi
#
# Self-contained STEP folder; paths are relative to this folder. Step 2 performs
# TWO independent joins onto the Bagrut record-level table:
#   Join A  Bagrut <-> CBS      on normalised locality NAME (4-stage fuzzy)
#   Join B  Bagrut <-> Budget   on SCHOOL CODE semel (exact key, no fuzzy needed)
# Both attach onto the same 69,638-row Bagrut table -> one consolidated matrix.
# =============================================================================

project:
  title: "Predicting Bagrut Success from Municipal Socioeconomics and School-Level Institutional Resources"
  authors:
    - "Yousef Shihade"
    - "Shada Esawi"

seed: 42

paths:
  bagrut_clean: "../step_1_ingestion_standardization/data/bagrut_clean.csv"
  ses_clean:    "../step_1_ingestion_standardization/data/ses_clean.csv"
  budget_clean: "../step_1_ingestion_standardization/data/budget_clean.csv"
  out_data:     "data"
  out_graphs:   "graphs"
  merged_out:   "data/merged_three_datasets.csv"
  mapping_out:  "data/city_mapping_log.csv"

io:
  encoding: "utf-8-sig"

# -----------------------------------------------------------------------------
# Join A — Bagrut <-> CBS  (fuzzy locality-name matching; semel is NOT usable —
# it is a school code in Bagrut but a locality code in CBS, zero overlap)
# -----------------------------------------------------------------------------
matching:
  bagrut_key: "city_norm"
  ses_key:    "locality_norm"
  ses_code:   "locality_code"
  ses_dedup_by: "population"     # keep the larger locality when names collide
  fuzzy_threshold: 90            # token_sort_ratio in [0,100]; conservative
  fuzzy_scorer: "token_sort_ratio"
  fuzzy_min_len_ratio: 0.6       # reject matches where length ratio < this

ses_feature_columns:
  - "locality_code"
  - "locality_name"
  - "locality_form"
  - "population"
  - "index_value"
  - "cluster"

# -----------------------------------------------------------------------------
# Join B — Bagrut <-> Budget  (exact key: semel is a SCHOOL code in both)
# -----------------------------------------------------------------------------
budget_join:
  key: "semel"
  # Columns carried in from the budget table (categorical + numeric ingredients;
  # ratio features such as total_budget_per_student are engineered in Step 3).
  feature_columns:
    - "district"
    - "sector"
    - "supervision"
    - "legal_status"
    - "education_stage"
    - "nurture_quintile"
    - "avg_class_size"
    - "students_regular"
    - "students_special"
    - "classes_regular"
    - "budget_total"
    - "cost_teaching"
    - "cost_tuition"
    - "cost_perimeter"
    - "cost_projects"
    - "cost_purchases"
    - "cost_transport"
    - "hours_private"

# Display labels reused from Step 1 (English category names for plots).
display_labels:
  sector:
    "יהודי": "Jewish"
    "ערבי": "Arab"
    "בדואי": "Bedouin"
    "דרוזי": "Druze"
    "צרקסי": "Circassian"
  supervision:
    "ממלכתי": "State"
    "ממלכתי דתי": "State-religious"
    "חרדי": "Haredi"
