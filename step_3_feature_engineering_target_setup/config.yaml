# =============================================================================
# BagrutProject v2 — Step 3 Configuration (Feature Engineering & Target Setup)
# Project: Predicting Bagrut Success from Municipal Socioeconomics and
#          School-Level Institutional Resources
# Authors: Yousef Shihade & Shada Esawi
#
# Consumes Step 2's three-way-merged record-level table and re-grains it to
# SCHOOL level (semel x year). Targets are Math + English only (as in v1) — the
# NEW part is engineering ~15 numeric + 6 categorical predictors from the budget
# dataset alongside the original CBS municipal features.
# =============================================================================

project:
  title: "Predicting Bagrut Success from Municipal Socioeconomics and School-Level Resources"
  authors:
    - "Yousef Shihade"
    - "Shada Esawi"

seed: 42

paths:
  merged_in:        "../step_2_data_merging_integration/data/merged_three_datasets.csv"
  out_data:         "data"
  out_graphs:       "graphs"
  school_level_out: "data/school_level_features_targets.csv"

io:
  encoding: "utf-8-sig"

# Modeling grain — one row per school per year (unchanged from v1).
grain: ["semel", "year"]

subjects:
  core:
    math:    "מתמטיקה"
    english: "אנגלית"
  participation_units: [3, 4, 5]   # academic-track denominator
  advanced_units: 5                # advanced track == 5-unit exam

# -----------------------------------------------------------------------------
# CBS municipal predictors carried onto each school row (constant per semel).
# district / מחוז is still not in the CBS extract itself — but the budget file
# now supplies a district column (see budget_categorical below).
# -----------------------------------------------------------------------------
cbs_features:
  - "cluster"
  - "index_value"       # kept for VIF demonstration; dropped before modeling (Step 5)
  - "population"
  - "locality_form"
  - "ses_locality_name"

# -----------------------------------------------------------------------------
# Budget-file columns carried onto each school row (also constant per semel —
# one budget snapshot broadcast across a school's years; see Step 3 README for
# the single-year-snapshot limitation this implies).
# -----------------------------------------------------------------------------
budget_categorical:
  - "district"
  - "sector"
  - "supervision"
  - "legal_status"
  - "education_stage"

budget_direct_numeric:        # already-meaningful features, no ratio needed
  - "nurture_quintile"
  - "avg_class_size"

# Raw ingredients used ONLY to compute the per-student ratio features below
# (not exposed to modeling directly — a raw budget total isn't comparable across
# schools of very different sizes).
budget_ratio_ingredients:
  - "students_regular"
  - "students_special"
  - "budget_total"
  - "cost_teaching"
  - "cost_tuition"
  - "cost_perimeter"
  - "cost_projects"
  - "cost_purchases"
  - "cost_transport"
  - "hours_private"

# name -> (numerator column, denominator column). All divide by enrolled
# REGULAR students (the standard Ministry denominator); special_ed_share and
# log_school_size are computed separately (see feature_engineering.py).
budget_ratios:
  total_budget_per_student:    ["budget_total",   "students_regular"]
  teaching_budget_per_student: ["cost_teaching",  "students_regular"]
  tuition_per_student:         ["cost_tuition",   "students_regular"]
  perimeter_per_student:       ["cost_perimeter", "students_regular"]
  projects_per_student:        ["cost_projects",  "students_regular"]
  purchases_per_student:       ["cost_purchases", "students_regular"]
  # NOTE: cost_transport ("תקציב הסעות") is predominantly NEGATIVE in the raw
  # Ministry file (86% of institutions) -> this is a net budget adjustment /
  # correction figure, not gross transport spending. Kept as-is (real signal,
  # sign is meaningful) but documented here and in the Step 3 README so it is
  # never mis-read as a plain "cost".
  transport_per_student:       ["cost_transport", "students_regular"]
  private_hours_per_student:   ["hours_private",  "students_regular"]

id_columns:
  - "school"
  - "city"
  - "city_norm"
  - "match_stage"

# English display labels reused for plots (Hebrew renders reversed in matplotlib).
display_labels:
  sector:
    "יהודי": "Jewish"
    "ערבי": "Arab"
    "בדואי": "Bedouin"
    "דרוזי": "Druze"
    "צרקסי": "Circassian"
  supervision:
    "ממלכתי": "State"
    "ממלכתי דתי": "State-religious"
    "חרדי": "Haredi"
  district:
    "ירושלים": "Jerusalem"
    "תל אביב": "Tel Aviv"
    "מרכז": "Center"
    "צפון": "North"
    "דרום": "South"
    "חיפה": "Haifa"
