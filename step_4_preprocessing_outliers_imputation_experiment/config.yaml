# =============================================================================
# BagrutProject v2 — Step 4 Configuration
# Preprocessing, Outlier Detection & the Multi-Iteration MICE Robustness Experiment
# Project: Predicting Bagrut Success from Municipal Socioeconomics and
#          School-Level Institutional Resources
# Authors: Yousef Shihade & Shada Esawi
#
# v2 CHANGE: the MICE experiment (Task A) now repeats the masking experiment
# N_ITERATIONS times with different random seeds, reporting mean +/- std across
# runs instead of a single R^2. Our review of the imputation literature showed
# that a single masked run is not sufficient evidence of stability — the
# accepted practice is to report a distribution over many independent draws.
# Outlier detection (Task B) and the exploratory questions (Task C) are
# otherwise unchanged from v1, now operating on the richer v2 feature space.
# =============================================================================

project:
  title: "Predicting Bagrut Success from Municipal Socioeconomics and School-Level Resources"
  authors:
    - "Yousef Shihade"
    - "Shada Esawi"

seed: 42

paths:
  school_level_in: "../step_3_feature_engineering_target_setup/data/school_level_features_targets.csv"
  out_data:        "data"
  out_graphs:      "graphs"
  cleaned_out:     "data/cleaned_modeling_ready.csv"
  mice_runs_out:   "data/mice_robustness_runs.csv"

io:
  encoding: "utf-8-sig"

targets:
  - "math_avg_grade"
  - "english_avg_grade"
  - "math_5unit_participation"
  - "english_5unit_participation"

# --- Task A: MICE imputation robustness experiment (v2: multi-iteration) ----
imputation_experiment:
  # index_value (the CBS continuous socioeconomic score) is 100% complete on
  # cluster-present rows and strongly structured -> cleanly contrasts MICE vs a
  # median baseline. Same target as v1 for direct before/after comparability.
  target_feature: "index_value"
  mask_fraction: 0.08          # within the required 5-10% band
  mice_max_iter: 15
  n_iterations: 25             # NEW: independent random-seed repeats for stability evidence
  # Numeric predictors IterativeImputer (MICE) may use — expanded in v2 with the
  # budget-derived features, so the demonstration reflects the richer dataset.
  predictors:
    - "cluster"
    - "index_value"
    - "population"
    - "math_avg_grade"
    - "english_avg_grade"
    - "math_5unit_participation"
    - "english_5unit_participation"
    - "math_takers_total"
    - "english_takers_total"
    - "total_budget_per_student"
    - "teaching_budget_per_student"
    - "avg_class_size"
    - "nurture_quintile"
    - "special_ed_share"

# --- Task B: Outlier detection (unchanged method, richer feature space) -----
outliers:
  contamination: 0.05
  lof_neighbors: 20
  features:
    - "combined_avg_grade"
    - "math_5unit_participation"
    - "english_5unit_participation"
    - "cluster"
    - "index_value"
    - "log_population"
    - "log_total_takers"
    - "total_budget_per_student"     # NEW: institutional resourcing dimension
    - "avg_class_size"               # NEW: pedagogical resourcing dimension

# --- Task C: exploratory questions (unchanged from v1) ----------------------
exploratory:
  resilience_low_cluster: 2
  resilience_high_cluster: 9
  overachiever_low_clusters: [1, 2, 3, 4]
  overachiever_elite_clusters: [8, 9, 10]
  overachiever_benchmark: "median"
